<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Lumioly{% endblock %} — AI Intelligence Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --surface: #111111; --surface-2: #1a1a1a; --surface-3: #222222;
      --border: rgba(255,255,255,0.07); --border-hover: rgba(201,169,110,0.35);
      --text: #EDE9E0; --text-muted: #888888; --text-dim: #444444;
      --gold: #C9A96E; --gold-light: #DEC08A; --gold-dim: rgba(201,169,110,0.12); --gold-glow: rgba(201,169,110,0.08);
      --font-serif: 'Cormorant Garamond', Georgia, serif; --font-sans: 'Outfit', sans-serif;
      --radius: 8px; --radius-lg: 14px; --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; font-size: 15px; line-height: 1.6; letter-spacing: 0.01em; }

    #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .page-wrapper { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Navbar ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 64px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); z-index: 101; }
    .nav-logo-icon { width: 20px; height: 20px; color: var(--gold); }
    .nav-logo-text { font-family: var(--font-serif); font-size: 22px; font-weight: 500; letter-spacing: 0.02em; }
    .nav-links { display: flex; align-items: center; gap: 40px; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 13px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; transition: color var(--transition); }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }

    /* ── Burger ── */
    .burger {
      display: none; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
      width: 40px; height: 40px; background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; z-index: 101;
      transition: border-color var(--transition);
    }
    .burger:hover { border-color: var(--border-hover); }
    .burger span { display: block; width: 18px; height: 1.5px; background: var(--text-muted); border-radius: 2px; transition: all 0.3s ease; transform-origin: center; }
    .burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); background: var(--gold); }
    .burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); background: var(--gold); }

    /* ── Mobile drawer ── */
    .mobile-nav {
      display: none; position: fixed; top: 64px; left: 0; right: 0; bottom: 0;
      background: rgba(8,8,8,0.98); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      z-index: 99; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      border-top: 1px solid var(--border);
      opacity: 0; transform: translateY(-8px);
      transition: opacity 0.25s ease, transform 0.25s ease; pointer-events: none;
    }
    .mobile-nav.open { opacity: 1; transform: translateY(0); pointer-events: all; }
    .mobile-nav a {
      text-decoration: none; color: var(--text-muted);
      font-size: 36px; font-family: var(--font-serif); font-weight: 300; letter-spacing: 0.04em;
      padding: 16px 40px; transition: color var(--transition); text-align: center;
    }
    .mobile-nav a:hover, .mobile-nav a.active { color: var(--gold); }
    .mobile-nav-footer { position: absolute; bottom: 48px; font-size: 11px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }

    /* ── Main ── */
    main { flex: 1; padding: 0 48px; max-width: 1280px; margin: 0 auto; width: 100%; }

    /* ── Footer ── */
    footer { border-top: 1px solid var(--border); padding: 32px 48px; display: flex; align-items: center; justify-content: space-between; color: var(--text-dim); font-size: 12px; letter-spacing: 0.06em; position: relative; z-index: 1; }
    footer .gold { color: var(--gold); }

    /* ── Typography ── */
    h1, h2, h3 { font-family: var(--font-serif); font-weight: 400; line-height: 1.15; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 22px; border-radius: var(--radius); font-family: var(--font-sans); font-size: 13px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; text-decoration: none; transition: all var(--transition); border: none; }
    .btn-gold { background: var(--gold); color: #0a0a0a; }
    .btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 4px 24px rgba(201,169,110,0.25); }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--gold); background: var(--gold-dim); }
    .btn-surface { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-surface:hover { border-color: var(--border-hover); color: var(--gold); }

    /* ── Cards ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); transition: all var(--transition); overflow: hidden; }
    .card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,169,110,0.08); }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
    .badge-gold   { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,169,110,0.2); }
    .badge-surface { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }

    /* ── Inputs ── */
    input[type="text"], input[type="search"], select, textarea { font-family: var(--font-sans); font-size: 14px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 10px 16px; outline: none; transition: border-color var(--transition); width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: var(--gold); }
    input::placeholder, textarea::placeholder { color: var(--text-dim); }
    select option { background: var(--surface-2); }

    /* ── Section label ── */
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); display: flex; align-items: center; gap: 8px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); max-width: 60px; }

    hr { border: none; border-top: 1px solid var(--border); }
    [data-lucide] { width: 16px; height: 16px; }
    [data-lucide].icon-sm { width: 14px; height: 14px; }
    [data-lucide].icon-lg { width: 20px; height: 20px; }
    [data-lucide].icon-xl { width: 28px; height: 28px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

    /* ── Mobile breakpoint ── */
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      main { padding: 0 20px; }
      footer { padding: 24px 20px; flex-direction: column; gap: 8px; text-align: center; }
      .nav-links { display: none; }
      .burger { display: flex; }
      .mobile-nav { display: flex; }
    }
  </style>
  {% block extra_styles %}{% endblock %}
</head>

<body>
  <canvas id="particles"></canvas>
  <div class="page-wrapper">

    <nav>
      <a href="/" class="nav-logo">
        <svg class="nav-logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3L13.5 8.5L19 10L13.5 11.5L12 17L10.5 11.5L5 10L10.5 8.5Z"/>
          <path d="M5 3L5.75 5.25L8 6L5.75 6.75L5 9L4.25 6.75L2 6L4.25 5.25Z"/>
          <path d="M19 15L19.75 17.25L22 18L19.75 18.75L19 21L18.25 18.75L16 18L18.25 17.25Z"/>
        </svg>
        <span class="nav-logo-text">Lumioly</span>
      </a>

      <ul class="nav-links">
        <li><a href="/" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>Home</a></li>
        <li><a href="/news/" {% if request.resolver_match.url_name == 'news_list' %}class="active"{% endif %}>News</a></li>
        <li><a href="/tools/" {% if request.resolver_match.url_name == 'tool_list' %}class="active"{% endif %}>Tools</a></li>
      </ul>

      <button class="burger" id="burger-btn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <div class="mobile-nav" id="mobile-nav">
      <a href="/" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %} onclick="closeMenu()">Home</a>
      <a href="/news/" {% if request.resolver_match.url_name == 'news_list' %}class="active"{% endif %} onclick="closeMenu()">News</a>
      <a href="/tools/" {% if request.resolver_match.url_name == 'tool_list' %}class="active"{% endif %} onclick="closeMenu()">Tools</a>
      <div class="mobile-nav-footer">Lumioly — AI Intelligence Hub</div>
    </div>

    <main>{% block content %}{% endblock %}</main>

    <footer>
      <span>© 2026 <span class="gold">Lumioly</span> — Built by Nungo Tshidzumba</span>
      <span>Powered by <span class="gold">Gemini AI</span></span>
    </footer>
  </div>

  <script>
    // Particles
    const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
    let W, H, stars = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    function initStars() { stars = []; const n = Math.floor((W*H)/12000); for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*0.9+0.2,alpha:Math.random()*0.5+0.05,speed:Math.random()*0.0006+0.0002,phase:Math.random()*Math.PI*2}); }
    function draw(t) { ctx.clearRect(0,0,W,H); stars.forEach(s => { const a=s.alpha*(0.5+0.5*Math.sin(t*s.speed+s.phase)); ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(201,169,110,${a})`; ctx.fill(); }); requestAnimationFrame(draw); }
    resize(); initStars(); requestAnimationFrame(draw);
    window.addEventListener('resize', () => { resize(); initStars(); });

    // Burger menu
    const burgerBtn = document.getElementById('burger-btn');
    const mobileNav = document.getElementById('mobile-nav');
    let menuOpen = false;
    function openMenu()  { menuOpen=true;  burgerBtn.classList.add('open');    mobileNav.classList.add('open');    document.body.style.overflow='hidden'; }
    function closeMenu() { menuOpen=false; burgerBtn.classList.remove('open'); mobileNav.classList.remove('open'); document.body.style.overflow=''; }
    burgerBtn.addEventListener('click', () => menuOpen ? closeMenu() : openMenu());
    document.addEventListener('keydown', e => { if(e.key==='Escape') closeMenu(); });

    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
